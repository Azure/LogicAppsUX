name: "Test Copilot CLI"

on:
  workflow_dispatch:

permissions:
  contents: read
  copilot-requests: write

jobs:
  copilot-cli-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Install Copilot CLI
        run: npm install -g @github/copilot@latest

      - name: Test CLI invocation (GITHUB_TOKEN installation auth, org-billed)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RESULT=$(timeout 60 copilot --yolo \
            -p "Respond with exactly: COPILOT_CLI_WORKING" \
            --model claude-opus-4.8 2>&1) || true
          echo "Result: $RESULT"
          if echo "$RESULT" | grep -q "COPILOT_CLI_WORKING"; then
            echo "Copilot CLI is working (installation auth)"
          else
            echo "::error::Copilot CLI did not return expected response"
            echo "Full output: $RESULT"
            exit 1
          fi
