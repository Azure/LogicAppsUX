name: "Test Copilot CLI"

on:
  workflow_dispatch:
  pull_request:

permissions:
  contents: read
  copilot-requests: write

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Install Copilot CLI
        run: npm install -g @github/copilot@latest

      - name: Test CLI invocation
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RESULT=$(COPILOT_GITHUB_TOKEN="$GITHUB_TOKEN" timeout 60 copilot \
            -p "Respond with exactly: COPILOT_CLI_WORKING" \
            -s --no-ask-user --model claude-opus-4.8 --allow-all 2>&1) || true
          echo "Result: $RESULT"
          if echo "$RESULT" | grep -q "COPILOT_CLI_WORKING"; then
            echo "Copilot CLI is working"
          else
            echo "::warning::Copilot CLI did not return expected response"
            echo "Full output: $RESULT"
          fi
