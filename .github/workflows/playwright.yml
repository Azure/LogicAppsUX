name: Playwright Tests
on:
  push:
    branches: [main, dev/*, hotfix/*]
  pull_request:
    branches: [main, dev/*, hotfix/*]

jobs:
  designer-e2e-shards:
    timeout-minutes: 90
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shardIndex: [1, 2, 3]
        shardTotal: [3]
    steps:
    - uses: actions/checkout@v5
    - uses: actions/setup-node@v5
      with:
        node-version: 24.x
        package-manager-cache: false
    - uses: pnpm/action-setup@v5
      with:
        version: 9.1.3
        run_install: |
          - recursive: true
            args: [--frozen-lockfile, --strict-peer-dependencies]

    - name: Install Playwright Browsers
      run: pnpm run e2e:setup
    - name: Run Designer Playwright tests
      run: pnpm run test:e2e:designer --grep @mock --shard=${{ matrix.shardIndex }}/${{ matrix.shardTotal }}
      env:
        TEST_SHARDED: true
    - uses: actions/upload-artifact@v6
      if: always()
      with:
        name: designer-playwright-report-${{ matrix.shardIndex }}
        path: blob-report/
        retention-days: 1

  test:
    if: ${{ !cancelled() }}
    needs: [designer-e2e-shards]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24.x
          package-manager-cache: false

      - name: Download blob reports from GitHub Actions Artifacts
        uses: actions/download-artifact@v7
        with:
          path: all-blob-reports
          pattern: designer-playwright-report-*
          merge-multiple: true

      - name: Merge into HTML Report
        run: npx playwright merge-reports --reporter html ./all-blob-reports

      - name: Upload HTML report
        uses: actions/upload-artifact@v6
        with:
          name: designer-playwright-report
          path: playwright-report
          retention-days: 14

  chat-client-tests:
    name: Chat Client E2E Tests
    timeout-minutes: 90
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v5
    - uses: actions/setup-node@v5
      with:
        node-version: 24.x
        package-manager-cache: false
    - uses: pnpm/action-setup@v5
      with:
        version: 9.1.3
        run_install: |
          - recursive: true
            args: [--frozen-lockfile, --strict-peer-dependencies]

    - name: Install Playwright Browsers
      run: pnpm run e2e:setup
    - name: Run Chat Client Playwright tests
      run: pnpm run test:e2e:chatClient --grep @mock
    - uses: actions/upload-artifact@v6
      if: always()
      with:
        name: chat-client-playwright-report
        path: playwright-report/
        retention-days: 30
