name: Update Knowledge Graphs

# Rebuild Graphify knowledge graphs when source code changes on main.
# Uses pure AST extraction (no LLM, no API keys, ~30s for all libs).

on:
  push:
    branches: [main]
    paths:
      - 'libs/*/src/**/*.ts'
      - 'libs/*/src/**/*.tsx'

jobs:
  rebuild-graphs:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install Graphify
        run: pip install graphifyy

      - name: Rebuild all knowledge graphs
        run: |
          LIBS="designer-v2 designer designer-ui logic-apps-shared data-mapper-v2 a2a-core chatbot vscode-extension"
          for lib in $LIBS; do
            if [ -d "libs/$lib/src" ]; then
              cd "libs/$lib"
              graphify update src/ 2>&1 | grep -E "Rebuilt|error" || true
              cd "$GITHUB_WORKSPACE"
            fi
          done

      - name: Strip absolute paths
        run: |
          for f in libs/*/src/graphify-out/graph.json libs/*/src/graphify-out/GRAPH_REPORT.md; do
            if [ -f "$f" ]; then
              sed -i "s|$GITHUB_WORKSPACE/||g; s|$GITHUB_WORKSPACE||g" "$f"
              encoded=$(echo "$GITHUB_WORKSPACE" | tr '/' '_' | tr '[:upper:]' '[:lower:]' | sed 's/^_//')
              sed -i "s|${encoded}_||g" "$f"
            fi
          done

      - name: Check for changes
        id: check
        run: |
          git diff --quiet libs/*/src/graphify-out/ && echo "changed=false" >> "$GITHUB_OUTPUT" || echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Commit updated graphs
        if: steps.check.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add libs/*/src/graphify-out/GRAPH_REPORT.md libs/*/src/graphify-out/graph.json
          git commit -m "chore: update knowledge graphs [skip ci]

          Auto-generated by Graphify after source code changes.

          Co-authored-by: github-actions[bot] <github-actions[bot]@users.noreply.github.com>"
          git push
