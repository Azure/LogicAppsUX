name: VS Code Extension E2E Tests

on:
  push:
    branches: [main, dev/*, hotfix/*]
    paths:
      - 'apps/vs-code-designer/**'
      - 'apps/vs-code-react/**'
      - 'libs/vscode-extension/**'
      - 'libs/designer/**'
      - 'libs/designer-ui/**'
      - 'libs/designer-v2/**'
      - 'libs/logic-apps-shared/**'
      - 'libs/data-mapper-v2/**'
      - 'libs/data-mapper/**'
      - 'libs/chatbot/**'
      - 'pnpm-lock.yaml'
      - '.github/workflows/vscode-e2e.yml'
  pull_request:
    branches: [main, dev/*, hotfix/*]
    paths:
      - 'apps/vs-code-designer/**'
      - 'apps/vs-code-react/**'
      - 'libs/vscode-extension/**'
      - 'libs/designer/**'
      - 'libs/designer-ui/**'
      - 'libs/designer-v2/**'
      - 'libs/logic-apps-shared/**'
      - 'libs/data-mapper-v2/**'
      - 'libs/data-mapper/**'
      - 'libs/chatbot/**'
      - 'pnpm-lock.yaml'
      - '.github/workflows/vscode-e2e.yml'
  # Manual trigger so PR authors and chief-engineer agents can force a CI
  # re-run on the latest PR head (useful when path-filter coalescing
  # suppresses an expected auto-trigger after rapid pushes).
  workflow_dispatch:

concurrency:
  group: vscode-e2e-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  # Build the extension + compile the E2E test bundle ONCE per workflow run,
  # then fan out to the matrix shards which download the resulting artifact.
  # This eliminates ~3min of duplicated pnpm install + turbo build + tsup
  # work that previously ran on each of the 5 matrix shards in parallel.
  setup-extension-build:
    name: setup-extension-build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      build-artifact: extension-build-${{ github.sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Cache turbo build setup
        uses: actions/cache@v4
        with:
          path: .turbo
          # Content-based key: hits across pushes that don't change source.
          # Previously keyed on github.sha which missed on every push.
          key: ${{ runner.os }}-turbo-${{ hashFiles('apps/**/*.ts', 'apps/**/*.tsx', 'libs/**/*.ts', 'libs/**/*.tsx', 'pnpm-lock.yaml', 'turbo.json') }}
          restore-keys: |
            ${{ runner.os }}-turbo-

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x

      - name: Symlink node to system path (for func host child processes)
        run: |
          # Mirrors the matrix-job symlink step. Kept here so any tooling
          # invoked during build (turbo, tsup) that shells out to /usr/bin/node
          # resolves correctly. The matrix shards re-do this on their own
          # runners because each matrix entry is an independent VM.
          NODE_BIN="$(which node)"
          NPM_BIN="$(which npm)"
          NPX_BIN="$(which npx)"
          for dir in /usr/local/bin /usr/bin; do
            sudo ln -sf "$NODE_BIN" "$dir/node"
            sudo ln -sf "$NPM_BIN"  "$dir/npm"
            sudo ln -sf "$NPX_BIN"  "$dir/npx"
          done

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      # Cache the pnpm content-addressed store so matrix shards can rehydrate
      # node_modules faster on warm runs. The setup-extension-build job warms
      # this cache by running a full install below; shards restore the cache
      # and pnpm reuses store entries while falling back to the network for
      # anything missing (no --offline strictness).
      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9.1.3
          run_install: |
            - recursive: true
              args: [--frozen-lockfile, --strict-peer-dependencies]

      - name: Build extension
        run: pnpm turbo run build:extension --cache-dir=.turbo

      - name: Compile E2E tests
        working-directory: apps/vs-code-designer
        run: npx tsup --config tsup.e2e.test.config.ts

      - name: Tar build artifacts
        # Tar preserves symlinks/permissions and dramatically speeds upload
        # vs uploading thousands of small files in node_modules-adjacent dirs.
        run: |
          tar -czf extension-build.tar.gz \
            apps/vs-code-designer/dist/ \
            apps/vs-code-designer/out/ \
            $(find apps/vs-code-designer/node_modules/.cache -maxdepth 0 -type d 2>/dev/null)

      - name: Upload extension build artifact
        uses: actions/upload-artifact@v4
        with:
          name: extension-build-${{ github.sha }}
          path: extension-build.tar.gz
          retention-days: 1
          if-no-files-found: error

  # Run the fixtures-only scenario (p41a) ONCE per workflow run. Uploads
  # the resulting workspace tree + created-workspaces.json manifest so the
  # downstream per-scenario matrix shards can hydrate them instead of
  # paying the wizard-driven workspace creation cost on every shard.
  setup-fixtures:
    name: setup-fixtures (p41a)
    needs: setup-extension-build
    runs-on: ubuntu-latest
    # Headroom for one fresh-session retry (LA_E2E_SCENARIO_RETRIES) if the
    # fixtures scenario flakes, so the retry isn't killed mid-run.
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x

      - name: Symlink node to system path (for func host child processes)
        run: |
          NODE_BIN="$(which node)"
          NPM_BIN="$(which npm)"
          NPX_BIN="$(which npx)"
          for dir in /usr/local/bin /usr/bin; do
            sudo ln -sf "$NODE_BIN" "$dir/node"
            sudo ln -sf "$NPM_BIN"  "$dir/npm"
            sudo ln -sf "$NPX_BIN"  "$dir/npx"
          done

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9.1.3
          run_install: |
            - recursive: true
              args: [--frozen-lockfile, --strict-peer-dependencies]

      - name: Download extension build artifact
        uses: actions/download-artifact@v4
        with:
          name: extension-build-${{ github.sha }}
          path: .

      - name: Extract build artifacts
        run: tar -xzf extension-build.tar.gz

      - name: Install system dependencies for virtual display
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb libgbm-dev libgtk-3-0 libnss3 libasound2t64 libxss1 libatk-bridge2.0-0 libatk1.0-0

      - name: Cache Logic Apps runtime dependencies
        uses: actions/cache@v4
        with:
          path: ~/.azurelogicapps/dependencies
          key: la-runtime-deps-${{ runner.os }}-v1
          restore-keys: |
            la-runtime-deps-${{ runner.os }}-

      - name: Run fixtures scenario (p41a-fixtures)
        run: |
          export PATH="$(dirname $(which node)):/usr/local/bin:/usr/bin:/bin:$PATH"
          xvfb-run --auto-servernum --server-args="-screen 0 1920x1080x24" \
            node apps/vs-code-designer/out/test/run-e2e.js
        env:
          LA_E2E_SCENARIO: p41a-fixtures
          LA_E2E_STRICT_DEPENDENCY_VALIDATION: '1'
          # Retry a flaky fixtures run once in a fresh session before failing the
          # setup job (which would block every downstream shard). Non-masking: a
          # genuine failure still goes red after the retry.
          LA_E2E_SCENARIO_RETRIES: '1'
          NODE_OPTIONS: --max-old-space-size=4096
          # Node's os.tmpdir() honors TMPDIR/TMP/TEMP on Linux; setting TEMP
          # pins workspace + manifest creation under $RUNNER_TEMP/la-e2e-test
          # so the artifact upload below has a stable, scoped path.
          TEMP: ${{ runner.temp }}
          TMPDIR: ${{ runner.temp }}

      - name: Verify Logic Apps extension bundle sidecar
        run: |
          BUNDLE_ROOT="${HOME}/.azure-functions-core-tools/Functions/ExtensionBundles/Microsoft.Azure.Functions.ExtensionBundle.Workflows"
          node - "$BUNDLE_ROOT" <<'NODE'
          const fs = require('fs');
          const path = require('path');
          const root = process.argv[2];
          if (!fs.existsSync(root)) {
            throw new Error(`Bundle root missing: ${root}`);
          }
          const versions = fs.readdirSync(root)
            .filter((name) => /^\d+\.\d+\.\d+/.test(name) && fs.statSync(path.join(root, name)).isDirectory())
            .sort((a, b) => b.localeCompare(a, undefined, { numeric: true }));
          if (versions.length === 0) {
            throw new Error(`No bundle version folders under ${root}`);
          }
          const bundleDir = path.join(root, versions[0]);
          const sidecarPath = path.join(bundleDir, '.bundle-source-md5');
          if (!fs.existsSync(sidecarPath)) {
            throw new Error(`Bundle sidecar missing: ${sidecarPath}`);
          }
          const sidecar = JSON.parse(fs.readFileSync(sidecarPath, 'utf8'));
          if (!sidecar || typeof sidecar.sourceMd5 !== 'string' || typeof sidecar.contentHash !== 'string') {
            throw new Error(`Bundle sidecar missing sourceMd5/contentHash: ${sidecarPath}`);
          }
          const entries = fs.readdirSync(bundleDir).filter((name) => name !== '.bundle-source-md5');
          if (entries.length === 0) {
            throw new Error(`Bundle directory has no extracted content: ${bundleDir}`);
          }
          console.log(`Bundle verified: ${bundleDir}`);
          console.log(`Sidecar: ${sidecarPath}`);
          NODE

      - name: Verify fixtures manifest exists
        run: |
          MANIFEST="${RUNNER_TEMP}/la-e2e-test/created-workspaces.json"
          if [ ! -f "$MANIFEST" ]; then
            echo "::error::Fixtures manifest missing at $MANIFEST"
            ls -la "${RUNNER_TEMP}/la-e2e-test" || true
            exit 1
          fi
          echo "Manifest contents:"
          cat "$MANIFEST"

      - name: Tar created workspaces + manifest
        run: |
          tar -czf workspace-fixtures.tar.gz -C "${RUNNER_TEMP}" la-e2e-test

      - name: Tar Logic Apps extension bundle
        run: |
          tar -czf logic-apps-extension-bundle.tar.gz \
            -C "${HOME}/.azure-functions-core-tools/Functions/ExtensionBundles" \
            Microsoft.Azure.Functions.ExtensionBundle.Workflows

      - name: Upload workspace fixtures artifact
        uses: actions/upload-artifact@v4
        with:
          name: workspace-fixtures-${{ github.sha }}
          path: workspace-fixtures.tar.gz
          retention-days: 1
          if-no-files-found: error

      - name: Upload Logic Apps extension bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: logic-apps-extension-bundle-${{ github.sha }}
          path: logic-apps-extension-bundle.tar.gz
          retention-days: 1
          if-no-files-found: error

      - name: Upload fixture screenshots on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: vscode-e2e-screenshots-setup-fixtures
          path: |
            ${{ runner.temp }}/test-resources/screenshots/
            test-resources/screenshots/
          if-no-files-found: ignore
          retention-days: 30

  vscode-e2e:
    name: vscode-e2e (${{ matrix.shard }})
    needs: [setup-extension-build, setup-fixtures]
    # Grouped shards run scenarios sequentially and each failing scenario may
    # retry once in a fresh session (LA_E2E_SCENARIO_RETRIES). 35m gives the
    # heaviest group room for a retry without a timeout-induced failure.
    timeout-minutes: 35
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # Scenarios are grouped onto fewer runners to amortize the fixed CI
          # setup cost (pnpm install, node symlink, xvfb apt-get, artifact
          # download/extract, bundle + fixtures hydration) that each shard pays
          # once. `scenario` is a comma-separated list consumed by
          # LA_E2E_SCENARIO; run-e2e.js runs each entry in its OWN fresh VS Code
          # session (prepareFreshSession kills lingering processes between
          # scenarios), so grouping preserves per-scenario isolation — it is NOT
          # the flaky "multiple tests in one window" pattern. A failing scenario
          # still runs its siblings and fails the shard (aggregate = max exit).
          # use_* flags are the union of the group's needs.
          #
          # Extension activation smoke (p40) + create-a-project-for-conversion
          # (p48b). Grouped because both are fixture-independent and self-create
          # any workspace they need.
          - shard: activation-and-create
            scenario: p40-nonlogicapp,p48b-conversioncreate
            use_workspace_fixtures: false
            use_bundle_artifact: false
          # Full 12-shape workspace-creation wizard validation — self-creates its
          # own workspaces, so it doesn't consume the fixtures artifact, but it
          # still consumes the setup-fixtures bundle artifact and runs bundle
          # preflight. Kept on its own shard because it is the heaviest scenario.
          - shard: workspace-creation
            scenario: p41b-createworkspace-behavior
            use_workspace_fixtures: false
            use_bundle_artifact: true
          # Designer open → edit → save → debug → run lifecycle across app types.
          - shard: designer-lifecycle
            scenario: p42-standard,p42-customcode,p42-rulesengine
            use_workspace_fixtures: true
            use_bundle_artifact: true
          # Runtime-touching action tests (execute code / rules engine).
          - shard: runtime-actions
            scenario: p43-inlinejavascript,p43-customcode,p43-rulesengine
            use_workspace_fixtures: true
            use_bundle_artifact: true
          # Designer editing interactions: variables, extended view (parallel
          # branches / run-after), keyboard navigation.
          - shard: designer-interactions
            scenario: p44-statelessvariables,p45-designerviewextended,p46-keyboardnav
            use_workspace_fixtures: true
            use_bundle_artifact: true
          # Multi-designer + dataMapper suite (manifest-multi) + bundle repair.
          - shard: suite-and-bundle
            scenario: p47-suite,p412-bundlerepair
            use_workspace_fixtures: true
            use_bundle_artifact: true
          # Legacy project → workspace conversion variants.
          - shard: project-conversion
            scenario: p48a-conversionno,p48c-multipledesigners,p48d-conversionyes,p48e-conversionsubfolder
            use_workspace_fixtures: true
            use_bundle_artifact: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x

      - name: Symlink node to system path (for func host child processes)
        run: |
          # See setup-extension-build for the rationale. The Functions host
          # spawned by xvfb-run -> VS Code -> extension does not inherit the
          # workflow PATH from actions/setup-node, so we symlink into
          # /usr/bin and /usr/local/bin where any sanitized PATH will find it.
          NODE_BIN="$(which node)"
          NPM_BIN="$(which npm)"
          NPX_BIN="$(which npx)"
          for dir in /usr/local/bin /usr/bin; do
            sudo ln -sf "$NODE_BIN" "$dir/node"
            sudo ln -sf "$NPM_BIN"  "$dir/npm"
            sudo ln -sf "$NPX_BIN"  "$dir/npx"
          done
          echo "Symlinked node $(node --version) into /usr/local/bin and /usr/bin"
          env -i /usr/bin/node --version

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9.1.3
          run_install: |
            - recursive: true
              args: [--frozen-lockfile, --strict-peer-dependencies]

      - name: Download extension build artifact
        uses: actions/download-artifact@v4
        with:
          name: extension-build-${{ github.sha }}
          path: .

      - name: Extract build artifacts
        run: tar -xzf extension-build.tar.gz

      # Scenarios that self-create their workspaces set use_workspace_fixtures=false.
      - name: Download workspace fixtures artifact
        if: matrix.use_workspace_fixtures == true
        uses: actions/download-artifact@v4
        with:
          name: workspace-fixtures-${{ github.sha }}
          path: .

      - name: Extract workspace fixtures into $RUNNER_TEMP
        if: matrix.use_workspace_fixtures == true
        run: |
          mkdir -p "${RUNNER_TEMP}"
          tar -xzf workspace-fixtures.tar.gz -C "${RUNNER_TEMP}"
          echo "Extracted fixtures:"
          ls -la "${RUNNER_TEMP}/la-e2e-test" || true
          if [ -f "${RUNNER_TEMP}/la-e2e-test/created-workspaces.json" ]; then
            echo "Manifest:"
            cat "${RUNNER_TEMP}/la-e2e-test/created-workspaces.json"
          fi

      - name: Download Logic Apps extension bundle artifact
        if: matrix.use_bundle_artifact == true
        uses: actions/download-artifact@v4
        with:
          name: logic-apps-extension-bundle-${{ github.sha }}
          path: .

      - name: Extract Logic Apps extension bundle
        if: matrix.use_bundle_artifact == true
        run: |
          mkdir -p "${HOME}/.azure-functions-core-tools/Functions/ExtensionBundles"
          tar -xzf logic-apps-extension-bundle.tar.gz -C "${HOME}/.azure-functions-core-tools/Functions/ExtensionBundles"
          find "${HOME}/.azure-functions-core-tools/Functions/ExtensionBundles/Microsoft.Azure.Functions.ExtensionBundle.Workflows" -maxdepth 2 -type f -name '.bundle-source-md5' -print

      - name: Install system dependencies for virtual display
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb libgbm-dev libgtk-3-0 libnss3 libasound2t64 libxss1 libatk-bridge2.0-0 libatk1.0-0

      - name: Cache Logic Apps runtime dependencies
        uses: actions/cache@v4
        with:
          path: ~/.azurelogicapps/dependencies
          key: la-runtime-deps-${{ runner.os }}-v1
          restore-keys: |
            la-runtime-deps-${{ runner.os }}-

      - name: Run scenario group (${{ matrix.shard }})
        # Each shard runs one or more scenarios (comma-separated in
        # matrix.scenario) sequentially, each in its own fresh VS Code session.
        # Phase 4.1 (commits 2672168f7 + d866b3368) targeted the historically-
        # flaky scenarios (p42-standard, p42-customcode, p42-rulesengine,
        # p46-keyboardnav, p47-suite) at the root cause, and added a focus-reset
        # for the pre-existing p48d-conversionyes xvfb race.
        #
        # continue-on-error stays off so any future regression is surfaced as a
        # job-level failure (no longer masked). Flake closure gating is
        # structural: a red shard fails the workflow. run-e2e.js aggregates
        # exit = max across the group, so a failing scenario still runs its
        # siblings and fails the shard, and the failure mode + CI diff are
        # visible immediately instead of hidden behind allowFailure.
        run: |
          # Belt-and-suspenders PATH export (see grouped-shard rationale in git history).
          export PATH="$(dirname $(which node)):/usr/local/bin:/usr/bin:/bin:$PATH"
          echo "PATH=$PATH"
          xvfb-run --auto-servernum --server-args="-screen 0 1920x1080x24" \
            node apps/vs-code-designer/out/test/run-e2e.js
        env:
          # Grouped matrix: each shard runs one or more scenarios[] entries.
          LA_E2E_SCENARIO: ${{ matrix.scenario }}
          LA_E2E_BUNDLE_PREFLIGHT: ${{ matrix.use_bundle_artifact && '1' || '0' }}
          # Retry a failing scenario once in a fresh VS Code session to absorb
          # transient xvfb/focus/cold-start races. Non-masking: a scenario that
          # fails both attempts still fails the shard; a retry-to-pass is logged
          # as a `::warning::` flake so the race can still be root-caused.
          LA_E2E_SCENARIO_RETRIES: '1'
          NODE_OPTIONS: --max-old-space-size=4096
          # Pin os.tmpdir() so the bootstrapper finds the manifest the
          # setup-fixtures job uploaded (same RUNNER_TEMP layout).
          TEMP: ${{ runner.temp }}
          TMPDIR: ${{ runner.temp }}

      - name: Upload test screenshots (always)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: vscode-e2e-screenshots-${{ matrix.shard }}
          path: |
            ${{ runner.temp }}/test-resources/screenshots/
            test-resources/screenshots/
          if-no-files-found: ignore
          retention-days: 30

  vscode-e2e-compat:
    name: vscode-e2e compatibility (${{ matrix.label }})
    needs: setup-extension-build
    # Headroom for one activation-smoke retry (LA_E2E_SCENARIO_RETRIES).
    timeout-minutes: 25
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # The runner Node version drives pnpm/tsup/run-e2e.js and any child
          # processes that resolve node from PATH. The extension-host Node
          # version is owned by the VS Code/Electron build below.
          #
          # Keep an explicit legacy smoke so the latest extension continues to
          # activate on the stable runner/runtime combination used by the full
          # VS Code E2E suite.
          - label: node20-vscode108
            node-version: 20.x
            vscode-version: 1.108.0
          - label: node22-vscode108
            node-version: 22.x
            vscode-version: 1.108.0
          # VS Code 1.123 carries the Electron/Node 24 runtime that exposed the
          # removed node:util helper regression fixed by this branch.
          - label: node24-vscode123
            node-version: 24.x
            vscode-version: 1.123.0
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Symlink node to system path
        run: |
          NODE_BIN="$(which node)"
          NPM_BIN="$(which npm)"
          NPX_BIN="$(which npx)"
          for dir in /usr/local/bin /usr/bin; do
            sudo ln -sf "$NODE_BIN" "$dir/node"
            sudo ln -sf "$NPM_BIN"  "$dir/npm"
            sudo ln -sf "$NPX_BIN"  "$dir/npx"
          done
          echo "Symlinked node $(node --version) into /usr/local/bin and /usr/bin"
          env -i /usr/bin/node --version

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9.1.3
          run_install: |
            - recursive: true
              args: [--frozen-lockfile, --strict-peer-dependencies]

      - name: Download extension build artifact
        uses: actions/download-artifact@v4
        with:
          name: extension-build-${{ github.sha }}
          path: .

      - name: Extract build artifacts
        run: tar -xzf extension-build.tar.gz

      - name: Install system dependencies for virtual display
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb libgbm-dev libgtk-3-0 libnss3 libasound2t64 libxss1 libatk-bridge2.0-0 libatk1.0-0

      - name: Run compatibility activation smoke
        run: |
          export PATH="$(dirname $(which node)):/usr/local/bin:/usr/bin:/bin:$PATH"
          echo "PATH=$PATH"
          xvfb-run --auto-servernum --server-args="-screen 0 1920x1080x24" \
            node apps/vs-code-designer/out/test/run-e2e.js
        env:
          LA_E2E_SCENARIO: p40-nonlogicapp
          E2E_VSCODE_VERSION: ${{ matrix.vscode-version }}
          # Retry the activation smoke once in a fresh session to absorb
          # transient launch/activation races on the compat runtime matrix.
          LA_E2E_SCENARIO_RETRIES: '1'
          NODE_OPTIONS: --max-old-space-size=4096
          TEMP: ${{ runner.temp }}
          TMP: ${{ runner.temp }}
          TMPDIR: ${{ runner.temp }}

      - name: Upload test screenshots (always)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: vscode-e2e-screenshots-compat-${{ matrix.label }}
          path: |
            ${{ runner.temp }}/test-resources/screenshots/
            test-resources/screenshots/
          if-no-files-found: ignore
          retention-days: 30

  # Rollup status check so branch protection can require a single check name
  # ("vscode-e2e-summary") regardless of how many scenarios we add later.
  vscode-e2e-summary:
    name: vscode-e2e-summary
    needs: [setup-extension-build, setup-fixtures, vscode-e2e, vscode-e2e-compat]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Verify all jobs passed
        run: |
          echo "setup-extension-build: ${{ needs.setup-extension-build.result }}"
          echo "setup-fixtures:        ${{ needs.setup-fixtures.result }}"
          echo "vscode-e2e (matrix):   ${{ needs.vscode-e2e.result }}"
          echo "compat matrix:         ${{ needs.vscode-e2e-compat.result }}"
          if [ "${{ needs.setup-extension-build.result }}" != "success" ] || \
             [ "${{ needs.setup-fixtures.result }}" != "success" ] || \
             [ "${{ needs.vscode-e2e.result }}" != "success" ] || \
             [ "${{ needs.vscode-e2e-compat.result }}" != "success" ]; then
            echo "::error::One or more vscode-e2e jobs failed"
            exit 1
          fi
          echo "All vscode-e2e jobs passed."

