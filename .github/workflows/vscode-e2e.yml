name: VS Code Extension E2E Tests

on:
  push:
    branches: [main, dev/*, hotfix/*]
    paths:
      - 'apps/vs-code-designer/**'
      - 'apps/vs-code-react/**'
      - 'libs/vscode-extension/**'
      - 'libs/designer/**'
      - 'libs/designer-ui/**'
      - 'libs/designer-v2/**'
      - 'libs/logic-apps-shared/**'
      - 'libs/data-mapper-v2/**'
      - 'libs/data-mapper/**'
      - 'libs/chatbot/**'
      - 'pnpm-lock.yaml'
      - '.github/workflows/vscode-e2e.yml'
  pull_request:
    branches: [main, dev/*, hotfix/*]
    paths:
      - 'apps/vs-code-designer/**'
      - 'apps/vs-code-react/**'
      - 'libs/vscode-extension/**'
      - 'libs/designer/**'
      - 'libs/designer-ui/**'
      - 'libs/designer-v2/**'
      - 'libs/logic-apps-shared/**'
      - 'libs/data-mapper-v2/**'
      - 'libs/data-mapper/**'
      - 'libs/chatbot/**'
      - 'pnpm-lock.yaml'
      - '.github/workflows/vscode-e2e.yml'
  # Manual trigger so PR authors and chief-engineer agents can force a CI
  # re-run on the latest PR head (useful when path-filter coalescing
  # suppresses an expected auto-trigger after rapid pushes).
  workflow_dispatch:

concurrency:
  group: vscode-e2e-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  # Build the extension + compile the E2E test bundle ONCE per workflow run,
  # then fan out to the matrix shards which download the resulting artifact.
  # This eliminates ~3min of duplicated pnpm install + turbo build + tsup
  # work that previously ran on each of the 5 matrix shards in parallel.
  setup-extension-build:
    name: setup-extension-build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      build-artifact: extension-build-${{ github.sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Cache turbo build setup
        uses: actions/cache@v4
        with:
          path: .turbo
          # Content-based key: hits across pushes that don't change source.
          # Previously keyed on github.sha which missed on every push.
          key: ${{ runner.os }}-turbo-${{ hashFiles('apps/**/*.ts', 'apps/**/*.tsx', 'libs/**/*.ts', 'libs/**/*.tsx', 'pnpm-lock.yaml', 'turbo.json') }}
          restore-keys: |
            ${{ runner.os }}-turbo-

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x

      - name: Symlink node to system path (for func host child processes)
        run: |
          # Mirrors the matrix-job symlink step. Kept here so any tooling
          # invoked during build (turbo, tsup) that shells out to /usr/bin/node
          # resolves correctly. The matrix shards re-do this on their own
          # runners because each matrix entry is an independent VM.
          NODE_BIN="$(which node)"
          NPM_BIN="$(which npm)"
          NPX_BIN="$(which npx)"
          for dir in /usr/local/bin /usr/bin; do
            sudo ln -sf "$NODE_BIN" "$dir/node"
            sudo ln -sf "$NPM_BIN"  "$dir/npm"
            sudo ln -sf "$NPX_BIN"  "$dir/npx"
          done

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      # Cache the pnpm content-addressed store so matrix shards can rehydrate
      # node_modules faster on warm runs. The setup-extension-build job warms
      # this cache by running a full install below; shards restore the cache
      # and pnpm reuses store entries while falling back to the network for
      # anything missing (no --offline strictness).
      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9.1.3
          run_install: |
            - recursive: true
              args: [--frozen-lockfile, --strict-peer-dependencies]

      - name: Build extension
        run: pnpm turbo run build:extension --cache-dir=.turbo

      - name: Compile E2E tests
        working-directory: apps/vs-code-designer
        run: npx tsup --config tsup.e2e.test.config.ts

      - name: Tar build artifacts
        # Tar preserves symlinks/permissions and dramatically speeds upload
        # vs uploading thousands of small files in node_modules-adjacent dirs.
        run: |
          tar -czf extension-build.tar.gz \
            apps/vs-code-designer/dist/ \
            apps/vs-code-designer/out/ \
            $(find apps/vs-code-designer/node_modules/.cache -maxdepth 0 -type d 2>/dev/null)

      - name: Upload extension build artifact
        uses: actions/upload-artifact@v4
        with:
          name: extension-build-${{ github.sha }}
          path: extension-build.tar.gz
          retention-days: 1
          if-no-files-found: error

  vscode-e2e:
    name: vscode-e2e (${{ matrix.shard }})
    needs: setup-extension-build
    timeout-minutes: 35
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - shard: independent
            e2e_mode: independentonly
          - shard: designer
            e2e_mode: createplusdesigner
          - shard: newtests
            e2e_mode: createplusnewtests
          - shard: conversion
            e2e_mode: createplusconversion
          - shard: scenarios-pilot
            e2e_mode: scenarios-pilot

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x

      - name: Symlink node to system path (for func host child processes)
        run: |
          # actions/setup-node@v4 places node at /opt/hostedtoolcache and only
          # updates PATH for the workflow shell. The Functions host spawned by
          # the VS Code extension under xvfb-run does not inherit this PATH,
          # so its inline-code dependency generator fails with:
          #   "The 'node' process needed for inline code dependency generation
          #    could not be found on PATH"
          # CI run 25920892436 proved /usr/local/bin alone is not on the
          # func host's sanitized PATH. Symlink to /usr/bin AND /usr/local/bin
          # so any minimally-stripped PATH (which always includes /usr/bin)
          # finds node.
          NODE_BIN="$(which node)"
          NPM_BIN="$(which npm)"
          NPX_BIN="$(which npx)"
          for dir in /usr/local/bin /usr/bin; do
            sudo ln -sf "$NODE_BIN" "$dir/node"
            sudo ln -sf "$NPM_BIN"  "$dir/npm"
            sudo ln -sf "$NPX_BIN"  "$dir/npx"
          done
          echo "Symlinked node $(node --version) into /usr/local/bin and /usr/bin"
          ls -la /usr/local/bin/node /usr/bin/node
          # Verify node is reachable from a completely empty environment via
          # /usr/bin (the most conservative location).
          env -i /usr/bin/node --version

      # Rehydrate node_modules via pnpm. The store cache accelerates installs
      # on warm runs (~30-60s) but we don't enforce --offline because
      # pnpm/action-setup's batched install may not fully populate the store
      # for strict offline use, and a partial-cache network fallback is
      # preferable to ERR_PNPM_NO_OFFLINE_TARBALL failures.
      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9.1.3
          run_install: |
            - recursive: true
              args: [--frozen-lockfile, --strict-peer-dependencies]

      - name: Download extension build artifact
        uses: actions/download-artifact@v4
        with:
          name: extension-build-${{ github.sha }}
          path: .

      - name: Extract build artifacts
        run: tar -xzf extension-build.tar.gz

      - name: Install system dependencies for virtual display
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb libgbm-dev libgtk-3-0 libnss3 libasound2t64 libxss1 libatk-bridge2.0-0 libatk1.0-0

      # Cache the auto-downloaded runtime dependencies (func, dotnet, node)
      # so subsequent runs don't re-download ~500MB each time.
      # Shared across all matrix shards via a stable key (not shard-scoped).
      - name: Cache Logic Apps runtime dependencies
        uses: actions/cache@v4
        with:
          path: ~/.azurelogicapps/dependencies
          key: la-runtime-deps-${{ runner.os }}-v1
          restore-keys: |
            la-runtime-deps-${{ runner.os }}-
          # Save even when tests fail so deps are available on next run
          save-always: true

      - name: Run VS Code Extension E2E tests (${{ matrix.shard }})
        run: |
          # Explicitly export PATH so xvfb-run -> VS Code -> func host -> child
          # processes inherit the toolcache node location. Belt-and-suspenders
          # with the /usr/bin symlink: if any layer sanitizes PATH to a curated
          # list, /usr/bin alone should suffice; if a layer keeps the inherited
          # PATH, this line guarantees the toolcache is on it.
          export PATH="$(dirname $(which node)):/usr/local/bin:/usr/bin:/bin:$PATH"
          echo "PATH=$PATH"
          xvfb-run --auto-servernum --server-args="-screen 0 1920x1080x24" node apps/vs-code-designer/src/test/ui/run-e2e.js
        env:
          # Shard-specific subset of phases (see apps/vs-code-designer/src/test/ui/run-e2e.js).
          E2E_MODE: ${{ matrix.e2e_mode }}
          # Increase Node memory for CI
          NODE_OPTIONS: --max-old-space-size=4096
          # Set TEMP so screenshot paths are predictable on Linux
          # (process.env.TEMP is undefined on Ubuntu, causing fallback to cwd)
          TEMP: ${{ runner.temp }}

      # Screenshots are written to $TEMP/test-resources/screenshots/ by both:
      #   - Explicit test screenshots (e.g., inlineJS-after-request-trigger.png)
      #   - ExTester auto-failure screenshots (captured on test failure)
      # Upload ALL screenshots as artifacts so they're available for debugging
      # after the pipeline finishes, even if the runner is recycled.
      - name: Upload test screenshots (always)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: vscode-e2e-screenshots-${{ matrix.shard }}
          path: |
            ${{ runner.temp }}/test-resources/screenshots/
            test-resources/screenshots/
          if-no-files-found: ignore
          retention-days: 30

  # Rollup status check so branch protection can require a single check name
  # ("vscode-e2e-summary") regardless of how many shards we add later.
  vscode-e2e-summary:
    name: vscode-e2e-summary
    needs: vscode-e2e
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Verify all shards passed
        run: |
          echo "Shard results: ${{ toJSON(needs.vscode-e2e.result) }}"
          if [ "${{ needs.vscode-e2e.result }}" != "success" ]; then
            echo "::error::One or more vscode-e2e matrix shards failed (${{ needs.vscode-e2e.result }})"
            exit 1
          fi
          echo "All vscode-e2e shards passed."
