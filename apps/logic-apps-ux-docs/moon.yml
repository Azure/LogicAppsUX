id: logic-apps-ux-docs
language: typescript
platform: node
tags: []
tasks:
  build:
    command: docusaurus browser
    args:
      - --outputPath
      - $workspaceRoot/dist/apps/logic-apps-ux-docs
  serve:
    command: docusaurus dev-server
    args:
      - --port
      - '3000'
type: application
workspace:
  inheritedTasks:
    exclude: ['lint']
