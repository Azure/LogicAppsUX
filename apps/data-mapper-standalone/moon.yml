id: data-mapper-standalone
language: typescript
platform: node
tasks:
  build:
    command: webpack
    args:
      - --styles
      - '["apps/data-mapper-standalone/src/styles.less"]'
      - --index
      - $workspaceRoot/apps/data-mapper-standalone/src/index.html
      - --polyfills
      - $workspaceRoot/apps/data-mapper-standalone/src/polyfills.ts
      - --outputPath
      - $workspaceRoot/dist/apps/data-mapper-standalone
      - --assets
      - '["apps/data-mapper-standalone/src/favicon.ico","apps/data-mapper-standalone/src/assets"]'
      - --main
      - $workspaceRoot/apps/data-mapper-standalone/src/main.tsx
      - --scripts
      - '[]'
      - --statsJson
      - --webpackConfig
      - $workspaceRoot/custom-webpack.config.js
      - --tsConfig
      - $workspaceRoot/apps/data-mapper-standalone/tsconfig.app.json
    outputs:
      - '{options.outputPath}'
  build.development:
    extends: build
    args:
      - --sourceMap
      - --vendorChunk
      - --no-optimization
      - --no-extractLicenses
  build.production:
    extends: build
    args:
      - --no-sourceMap
      - --extractCss
      - --extractLicenses
      - --no-namedChunks
      - --fileReplacements
      - '[{"replace":"apps/data-mapper-standalone/src/environments/environment.ts","with":"apps/data-mapper-standalone/src/environments/environment.prod.ts"}]'
      - --outputHashing
      - all
      - --no-vendorChunk
      - --optimization
  serve:
    command: webpack dev-server
    args:
      - --buildTarget
      - data-mapper-standalone:build
      - --hmr
  serve.citest:
    extends: serve
    args:
      - --buildTarget
      - data-mapper-standalone:build:development
      - --ssl
      - --sslKey
      - $workspaceRoot/ci-key.pem
      - --host
      - localhost
      - --no-hmr
      - --sslCert
      - $workspaceRoot/ci-cert.pem
  serve.development:
    extends: serve
    args:
      - --buildTarget
      - data-mapper-standalone:build:development
  serve.production:
    extends: serve
    args:
      - --buildTarget
      - data-mapper-standalone:build:production
      - --ssl
      - --sslKey
      - $workspaceRoot/local-key.pem
      - --host
      - localhost
      - --no-hmr
      - --sslCert
      - $workspaceRoot/local-cert.pem
  test:
    command: jest
    args:
      - --jestConfig
      - $workspaceRoot/apps/data-mapper-standalone/jest.config.ts
      - --passWithNoTests
    outputs:
      - /coverage/apps/data-mapper-standalone
type: application
