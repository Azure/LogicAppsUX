id: designer-standalone
language: typescript
platform: node
tasks:
  serve:
    command: webpack serve
    args:
      - --config
      - ./webpack.config.js
  build:
    command: webpack
    args:
      - --config
      - ./webpack.config.js
  build.development:
    extends: build
    args:
      - --sourceMap
      - --vendorChunk
      - --no-optimization
      - --no-extractLicenses
  build.production:
    extends: build
    args:
      - --no-sourceMap
      - --extractCss
      - --extractLicenses
      - --no-namedChunks
      - --fileReplacements
      - '[{"replace":"apps/designer-standalone/src/environments/environment.ts","with":"apps/designer-standalone/src/environments/environment.prod.ts"}]'
      - --outputHashing
      - all
      - --no-vendorChunk
      - --optimization
  serve.citest:
    extends: serve
    args:
      - --buildTarget
      - designer-standalone:build:development
      - --ssl
      - --sslKey
      - $workspaceRoot/ci-key.pem
      - --host
      - localhost
      - --no-hmr
      - --sslCert
      - $workspaceRoot/ci-cert.pem
  serve.development:
    extends: serve
    args:
      - --buildTarget
      - designer-standalone:build:development
  serve.production:
    extends: serve
    args:
      - --buildTarget
      - designer-standalone:build:production
      - --no-hmr
type: application
