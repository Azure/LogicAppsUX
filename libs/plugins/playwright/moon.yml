id: plugins-playwright
language: typescript
platform: node
tags: []
tasks:
  build:
    command: js tsc
    args:
      - --outputPath
      - $workspaceRoot/dist/libs/plugins/playwright
      - --tsConfig
      - $workspaceRoot/libs/plugins/playwright/tsconfig.lib.json
      - --main
      - $workspaceRoot/libs/plugins/playwright/src/index.ts
      - --assets
      - '["libs/plugins/playwright/*.md",{"glob":"**/!(*.ts)","input":"./libs/plugins/playwright/src","output":"./src"},{"glob":"**/*.d.ts","input":"./libs/plugins/playwright/src","output":"./src"},{"glob":"generators.json","input":"./libs/plugins/playwright","output":"."},{"glob":"executors.json","input":"./libs/plugins/playwright","output":"."}]'
    outputs:
      - '{options.outputPath}'
type: library
