id: vscode-extension
language: typescript
platform: node
tags: []
tasks:
  build:
    command: js tsc
    args:
      - --outputPath
      - $workspaceRoot/dist/libs/vscode-extension
      - --tsConfig
      - $workspaceRoot/libs/vscode-extension/tsconfig.json
      - --main
      - $workspaceRoot/libs/vscode-extension/src/index.ts
      - --assets
      - '["libs/vscode-extension/*.md"]'
    outputs:
      - '{options.outputPath}'
  test:
    command: jest
    args:
      - --jestConfig
      - $workspaceRoot/libs/vscode-extension/jest.config.ts
      - --passWithNoTests
    outputs:
      - /coverage/$projectRoot
type: library
