id: designer-client-services
language: typescript
platform: node
tags: []
tasks:
  build:
    command: rollup
    args:
    - --config
    - $workspaceRoot/libs/services/designer-client-services/rollup.config.ts
    - --configPlugin
    - "@rollup/plugin-typescript"
    outputs:
    - '{options.outputPath}'
  lint:
    command: linter eslint
    args:
    - --lintFilePatterns
    - '["libs/services/designer-client-services/**/*.ts"]'
    outputs:
    - '{options.outputFile}'
  test:
    command: jest
    args:
    - --jestConfig
    - $workspaceRoot/libs/services/designer-client-services/jest.config.ts
    - --passWithNoTests
    outputs:
    - /coverage/libs/services/designer-client-services
  yalcpush:
    command: npm run yalcpush
    deps:
    - ~:build
    outputs:
    - '{options.outputPath}'
type: library
