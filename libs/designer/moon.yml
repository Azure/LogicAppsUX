id: designer
language: typescript
platform: node
tasks:
  build:
    command: rollup
    args:
    - --buildableProjectDepsInPackageJsonType
    - dependencies
    - --project
    - $workspaceRoot/libs/designer/package.json
    - --external
    - '["react/jsx-runtime"]'
    - --outputPath
    - $workspaceRoot/dist/libs/designer
    - --rollupConfig
    - $workspaceRoot/@nrwl/react/plugins/bundle-rollup
    - --extractCss
    - --format
    - '["cjs","esm"]'
    - --assets
    - '[{"glob":"libs/designer/README.md","input":".","output":"."}]'
    - --entryFile
    - $workspaceRoot/libs/designer/src/index.ts
    - --tsConfig
    - $workspaceRoot/libs/designer/tsconfig.lib.json
    outputs:
    - '{options.outputPath}'
  build.vscode:
    extends: build
    args:
    - --outputPath
    - $workspaceRoot/dist/apps/vs-code-designer/designer
  lint:
    command: linter eslint
    args:
    - --lintFilePatterns
    - '["libs/designer/**/*.{ts,tsx,js,jsx}"]'
    outputs:
    - '{options.outputFile}'
  test:
    command: jest
    args:
    - --jestConfig
    - $workspaceRoot/libs/designer/jest.config.ts
    - --passWithNoTests
    outputs:
    - /coverage/libs/designer
  yalcpush:
    command: npm run yalcpush
    deps:
    - ~:build
    outputs:
    - '{options.outputPath}'
type: library
