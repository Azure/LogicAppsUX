id: designer
language: typescript
platform: node
tasks:
  build.vscode:
    extends: build
    args:
      - --outputPath
      - $workspaceRoot/dist/apps/vs-code-designer/designer
  yalcpush:
    command: npm run yalcpush
    deps:
      - ~:build
    outputs:
      - '{options.outputPath}'
type: library
