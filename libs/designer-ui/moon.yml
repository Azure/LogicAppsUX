id: designer-ui
language: typescript
platform: node
tags: []
tasks:
  build:
    command: rollup
    args:
    - --buildableProjectDepsInPackageJsonType
    - dependencies
    - --project
    - $workspaceRoot/libs/designer-ui/package.json
    - --external
    - '["react/jsx-runtime"]'
    - --outputPath
    - $workspaceRoot/dist/libs/designer-ui
    - --rollupConfig
    - $workspaceRoot/@nrwl/react/plugins/bundle-rollup
    - --format
    - '["cjs","esm"]'
    - --assets
    - '[{"glob":"libs/designer-ui/README.md","input":".","output":"."}]'
    - --entryFile
    - $workspaceRoot/libs/designer-ui/src/index.ts
    - --tsConfig
    - $workspaceRoot/libs/designer-ui/tsconfig.lib.json
    outputs:
    - '{options.outputPath}'
  lint:
    command: linter eslint
    args:
    - --lintFilePatterns
    - '["libs/designer-ui/**/*.{ts,tsx,js,jsx}"]'
    outputs:
    - '{options.outputFile}'
  test:
    command: jest
    args:
    - --jestConfig
    - $workspaceRoot/libs/designer-ui/jest.config.ts
    - --passWithNoTests
    outputs:
    - /coverage/libs/designer-ui
  yalcpush:
    command: npm run yalcpush
    deps:
    - ~:build
    outputs:
    - '{options.outputPath}'
type: library
